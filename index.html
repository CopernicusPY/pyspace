{%extends 'base.html'%}

{% block head %} 
<!-- Head -->
<link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='assets/iss.png')}}" />
<!-- Setup Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css"
    integrity="sha512-puBpdR0798OZvTTbP4A8Ix/l+A4dHDD0DGqYW6RQ+9jxkRFclaxxQb/SJAWZfWAkuyeQUytO7+7N4QKrDh+drA=="
    crossorigin="" />
<script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"
    integrity="sha512-QVftwZFqvtRNi0ZyCtsznlKSWOStnDORoefr1enyq5mVL4tmKB3S/EnC3rRJcxCPavG10IcrVGSmPh6Qw5lwrg=="
    crossorigin="">
</script>
<style>
    #issMap {
        height: 180px;
    }
</style>

<title>PySpace ISS Tracker</title>

{%endblock%}
<!-- Body -->
{% block body %}
    <h1>Where is the ISS?</h1>

    <p>
        latitude: <span id="lat"></span>°<br />
        longitude: <span id="lon"></span>°
    </p>

    <div id="issMap"></div>


    <script>
        function onMapClick(e) {
            var popup = L.popup()
            popup
                .setLatLng(e.latlng)
                .setContent("You clicked the map at " + e.latlng.toString().slice(6))
                .openOn(map);
        }

        // Making a map and tiles
        const map = L.map('issMap').setView([0, 0], 1);
        const attribution =
            '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors';

        const tileUrl = 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        const tiles = L.tileLayer(tileUrl, { attribution });
        tiles.addTo(map);

        // Making a marker with a custom icon
        const issIcon = L.icon({
            iconUrl: "{{ url_for('static', filename='assets/iss.png')}}",
            iconSize: [50, 32],
            iconAnchor: [25, 16]
        });

        const marker = L.marker([0, 0], { icon: issIcon }).addTo(map);
        map.on('click', onMapClick);

        let firstTime = true;

        async function getISS() {
            const response = await fetch("https://api.wheretheiss.at/v1/satellites/25544");
            const data = await response.json();
            const { latitude, longitude } = data;
            console.log(latitude, longitude)

            marker.setLatLng([latitude, longitude]);
            if (firstTime) {
                map.setView([latitude, longitude], 2);
                firstTime = false;
            }
            document.getElementById('lat').textContent = latitude.toFixed(2);
            document.getElementById('lon').textContent = longitude.toFixed(2);
        }

        getISS();

        setInterval(getISS, 1000);
    </script>


{%endblock%}
